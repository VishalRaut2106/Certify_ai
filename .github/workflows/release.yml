name: 🚀 Create Release

on:
  # ── Trigger 1: Manual — type version + notes in GitHub UI ──
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.1-web, v2.0-desktop)'
        required: true
        type: string
      release_notes:
        description: 'What changed in this release?'
        required: false
        type: string
        default: 'See commit history for details.'
      prerelease:
        description: 'Mark as pre-release (beta)?'
        required: false
        type: boolean
        default: false
      build_desktop:
        description: 'Build and attach Windows .exe?'
        required: false
        type: boolean
        default: false

  # ── Trigger 2: Auto — push a tag like "v2.0-desktop" ──
  push:
    tags:
      - 'v*'

jobs:
  # ════════════════════════════════════════════════════════════
  # JOB 1: Create the GitHub Release
  # ════════════════════════════════════════════════════════════
  create-release:
    name: 📋 Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      upload_url: ${{ steps.release.outputs.upload_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Resolved version: $VERSION"

      - name: Create and push tag (manual trigger only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.version }} 2>/dev/null && \
            git push origin ${{ steps.version.outputs.version }} || \
            echo "Tag already exists, skipping."

      - name: Generate changelog
        id: changelog
        run: |
          CURRENT_TAG="${{ steps.version.outputs.version }}"
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${CURRENT_TAG}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline --no-merges | head -20)
          else
            COMMITS=$(git log ${PREV_TAG}..HEAD --oneline --no-merges)
          fi
          {
            echo "commits<<EOF"
            echo "$COMMITS"
            echo "EOF"
            echo "prev_tag=$PREV_TAG"
          } >> $GITHUB_OUTPUT

      - name: Publish GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "CertifyAI ${{ steps.version.outputs.version }}"
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          draft: false
          body: |
            ## 🎓 CertifyAI ${{ steps.version.outputs.version }}

            ${{ github.event.inputs.release_notes || 'Automated release from tag push.' }}

            ---

            ### 📋 Changes since ${{ steps.changelog.outputs.prev_tag || 'the beginning' }}
            ```
            ${{ steps.changelog.outputs.commits }}
            ```

            ---

            ### 🚀 Run the Web App
            ```bash
            cd backend
            pip install -r requirements.txt
            uvicorn app:app --reload --port 5000
            ```
            Open **http://localhost:5000**

            ---

            ### 🖥️ Run the Desktop App (Windows)
            1. Download `CertifyAI-windows.zip` from the assets below (if available)
            2. Extract and run `CertifyAI.exe`
            > **Note:** Tesseract OCR must be installed separately on the target machine.
            > Download: https://github.com/UB-Mannheim/tesseract/wiki

            ---

            ### 🛠️ Tech Stack
            - **Backend:** FastAPI + Tesseract OCR + pyzbar QR decoder
            - **Frontend:** Vanilla HTML / CSS / JS
            - **Desktop:** pywebview wrapper

  # ════════════════════════════════════════════════════════════
  # JOB 2: Build Windows Desktop .exe
  # Runs only when:
  #   a) Tag contains "-desktop"  (e.g. v2.0-desktop)
  #   b) Manual trigger with build_desktop = true
  # ════════════════════════════════════════════════════════════
  build-desktop:
    name: 🖥️ Build Windows .exe
    needs: create-release
    runs-on: windows-latest
    permissions:
      contents: write

    if: |
      contains(github.ref, '-desktop') ||
      github.event.inputs.build_desktop == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Tesseract OCR
        run: |
          choco install tesseract --yes --no-progress
          echo "C:\Program Files\Tesseract-OCR" >> $env:GITHUB_PATH
        shell: powershell

      - name: Install Python dependencies
        run: |
          cd backend
          pip install -r requirements.txt --quiet
          pip install pywebview==5.0.5 pyinstaller==6.6.0 --quiet
        shell: powershell

      - name: Download Poppler
        run: |
          cd backend
          Invoke-WebRequest -Uri "https://github.com/oschwartz10612/poppler-windows/releases/download/v24.08.0-0/Release-24.08.0-0.zip" -OutFile "poppler.zip"
          Expand-Archive -Path "poppler.zip" -DestinationPath "poppler" -Force
        shell: powershell

      - name: Build with PyInstaller
        run: |
          cd backend
          pyinstaller CertifyAI.spec --noconfirm
        shell: powershell

      - name: Zip the output
        run: |
          cd backend
          Compress-Archive -Path dist\CertifyAI -DestinationPath CertifyAI-windows.zip
        shell: powershell

      - name: Upload .exe to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.version }}
          files: backend/CertifyAI-windows.zip
